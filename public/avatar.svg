<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
 <defs>
 <radialGradient id="spaceBg" cx="50%" cy="50%" r="70%">
 <stop offset="0%" stop-color="#C2185B" />
 <stop offset="60%" stop-color="#880E4F" />
 <stop offset="100%" stop-color="#1A0000" />
 </radialGradient>

 <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
 <stop offset="0%" stop-color="#FF5252" />
 <stop offset="100%" stop-color="#B71C1C" />
 </linearGradient>

 <linearGradient id="earOuter" x1="0%" y1="0%" x2="0%" y2="100%">
 <stop offset="0%" stop-color="#FF6347" />
 <stop offset="100%" stop-color="#CC3300" />
 </linearGradient>

 <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
 <feGaussianBlur stdDeviation="8" result="blur" />
 <feMerge>
 <feMergeNode in="blur" />
 <feMergeNode in="blur" />
 <feMergeNode in="SourceGraphic" />
 </feMerge>
 </filter>
 </defs>

 <style>
 /* Animationen */
 .cyber-eye {
 transform-origin: center;
 animation: pulse 3s infinite alternate;
 }
 .antenna {
 transform-origin: 300px 170px;
 animation: sway 4s infinite ease-in-out;
 }
 .star {
 animation: twinkle 5s infinite alternate;
 }
 .star-fast {
 animation: twinkle 2s infinite alternate;
 }
 .breathing {
 transform-origin: 300px 600px;
 animation: breathe 6s infinite ease-in-out;
 }

 @keyframes pulse {
 0% { opacity: 0.7; filter: drop-shadow(0 0 10px #00FFFF); }
 100% { opacity: 1; filter: drop-shadow(0 0 25px #00FFFF); }
 }
 @keyframes sway {
 0%, 100% { transform: rotate(-3deg); }
 50% { transform: rotate(5deg); }
 }
 @keyframes twinkle {
 0% { opacity: 0.2; transform: scale(0.8); }
 100% { opacity: 1; transform: scale(1.2); }
 }
 @keyframes breathe {
 0%, 100% { transform: scaleY(1); }
 50% { transform: scaleY(1.02); }
 }
 </style>

 <rect width="600" height="600" fill="url(#spaceBg)" />

 <g fill="#FFFFFF" opacity="0.8">
 <circle cx="100" cy="150" r="1.5" class="star" />
 <circle cx="50" cy="300" r="2.5" class="star-fast" fill="#FFC0CB"/>
 <circle cx="120" cy="450" r="1" />
 <circle cx="200" cy="80" r="2" class="star" />
 <circle cx="450" cy="120" r="1.5" class="star-fast" />
 <circle cx="520" cy="280" r="2" />
 <circle cx="480" cy="480" r="2.5" class="star" fill="#FFC0CB"/>
 <circle cx="550" cy="180" r="1" />
 <circle cx="80" cy="520" r="2" class="star-fast" />
 </g>

 <g class="breathing">

 <path d="M 450 550 Q 520 450 480 350 Q 540 450 490 550 Z" fill="url(#earOuter)" stroke="#8B0000" stroke-width="4" stroke-linejoin="round"/>
 <path d="M 473 390 Q 500 395 510 385" fill="none" stroke="#8B0000" stroke-width="4"/>
 <path d="M 465 440 Q 500 445 515 435" fill="none" stroke="#8B0000" stroke-width="4"/>
 <path d="M 460 490 Q 500 495 515 480" fill="none" stroke="#8B0000" stroke-width="4"/>

 <path d="M 200 430 L 200 600 L 400 600 L 400 430 Z" fill="#FF8A65" />
 <path d="M 220 440 L 220 600 L 380 600 L 380 440 Q 300 420 220 440 Z" fill="#FDF5E6" />

 <path d="M 210 240 C 130 240, 140 480, 180 500 C 220 520, 230 350, 210 240 Z" fill="url(#earOuter)" stroke="#8B0000" stroke-width="3"/>
 <path d="M 200 260 C 150 260, 160 460, 180 480 C 200 500, 215 350, 200 260 Z" fill="#FDF5E6" />

 <path d="M 390 240 C 470 240, 460 480, 420 500 C 380 520, 370 350, 390 240 Z" fill="url(#earOuter)" stroke="#8B0000" stroke-width="3"/>
 <path d="M 400 260 C 450 260, 440 460, 420 480 C 400 500, 385 350, 400 260 Z" fill="#FDF5E6" />

 <path d="M 200 240 C 180 380, 200 460, 300 460 C 400 460, 420 380, 400 240 Z" fill="#FDF5E6" stroke="#4E342E" stroke-width="3"/>

 <path d="M 270 455 L 285 485 L 300 465 L 315 485 L 330 455 Z" fill="#FDF5E6" stroke="#4E342E" stroke-width="3" stroke-linejoin="round"/>

 <path d="M 195 240 C 195 100, 405 100, 405 240 Z" fill="url(#helmetGrad)" stroke="#4E342E" stroke-width="4"/>
 <line x1="195" y1="240" x2="405" y2="240" stroke="#4E342E" stroke-width="6" stroke-linecap="round"/>
 <path d="M 390 190 L 430 170 L 400 210 Z" fill="#FF5252" stroke="#4E342E" stroke-width="3" stroke-linejoin="round"/>

 <g class="antenna">
 <path d="M 300 135 C 300 90, 320 80, 320 60" fill="none" stroke="#FF5252" stroke-width="6" stroke-linecap="round"/>
 <circle cx="320" cy="60" r="12" fill="#FF5252" stroke="#4E342E" stroke-width="2"/>
 </g>

 <path d="M 220 300 Q 250 310 270 300" fill="none" stroke="#212121" stroke-width="4" stroke-linecap="round"/>
 <path d="M 330 300 Q 350 310 380 300" fill="none" stroke="#212121" stroke-width="4" stroke-linecap="round"/>

 <path d="M 280 340 L 320 340 L 300 360 Z" fill="#3E2723" stroke="#3E2723" stroke-width="4" stroke-linejoin="round"/>
 <path d="M 290 342 L 310 342" stroke="#6D4C41" stroke-width="3" stroke-linecap="round"/> <path d="M 230 420 Q 300 395 370 420" fill="none" stroke="#3E2723" stroke-width="14" stroke-linecap="round"/>
 <path d="M 235 420 Q 300 400 365 420" fill="none" stroke="#1A0000" stroke-width="4" stroke-linecap="round"/>

 <g transform="translate(255, 190)">
 <circle cx="0" cy="0" r="22" fill="#00FFFF" filter="url(#cyanGlow)" class="cyber-eye"/>
 <circle cx="0" cy="0" r="22" fill="none" stroke="#1A0000" stroke-width="5"/>
 </g>

 <g transform="translate(345, 190)">
 <circle cx="0" cy="0" r="22" fill="#00FFFF" filter="url(#cyanGlow)" class="cyber-eye"/>
 <circle cx="0" cy="0" r="22" fill="none" stroke="#1A0000" stroke-width="5"/>
 </g>

 </g>
</svg>