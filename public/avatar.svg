<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" id="akamaru-avatar">
  <defs>
    <!-- Space background gradient -->
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#DC143C" />
      <stop offset="40%" stop-color="#7a0015" />
      <stop offset="100%" stop-color="#0a0000" />
    </radialGradient>

    <!-- Fur gradients -->
    <linearGradient id="furOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6347" />
      <stop offset="50%" stop-color="#FF4500" />
      <stop offset="100%" stop-color="#D32F2F" />
    </linearGradient>
    <linearGradient id="earInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F0" />
      <stop offset="100%" stop-color="#FADADD" />
    </linearGradient>
    <linearGradient id="helmetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B71C1C" />
      <stop offset="50%" stop-color="#D32F2F" />
      <stop offset="100%" stop-color="#8B0000" />
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="60%" stop-color="#00CED1" />
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0" />
    </radialGradient>

    <!-- Glow filters -->
    <filter id="cyanGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .head-group { animation: breathe 4s ease-in-out infinite; transform-origin: 250px 260px; }
    .ear-left { animation: twitchLeft 7s ease-in-out infinite; transform-origin: 140px 200px; }
    .ear-right { animation: twitchRight 8s ease-in-out infinite; transform-origin: 360px 200px; }
    .helmet-eyes { animation: pulseEyes 2.5s ease-in-out infinite; }
    .antenna-ball { animation: antennaWobble 3s ease-in-out infinite; transform-origin: 250px 115px; }
    .tail { animation: tailWag 4s ease-in-out infinite; transform-origin: 360px 360px; }
    .star-field { animation: starTwinkle 3s ease-in-out infinite alternate; }
    .hud-ring { animation: rotate 20s linear infinite; transform-origin: center; }
    .hud-ring-fast { animation: rotate 6s linear infinite reverse; transform-origin: center; }

    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.012) translateY(-2px); }
    }
    @keyframes twitchLeft {
      0%, 92%, 100% { transform: rotate(0deg); }
      95% { transform: rotate(-4deg); }
    }
    @keyframes twitchRight {
      0%, 88%, 100% { transform: rotate(0deg); }
      92% { transform: rotate(4deg); }
    }
    @keyframes pulseEyes {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    @keyframes antennaWobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(3deg); }
      75% { transform: rotate(-3deg); }
    }
    @keyframes tailWag {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-6deg); }
    }
    @keyframes starTwinkle {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Space background -->
  <rect width="500" height="500" fill="url(#spaceGradient)" rx="12" />

  <!-- Stars -->
  <g class="star-field" fill="#FFF" opacity="0.8">
    <circle cx="50" cy="80" r="1.2" opacity="0.7" />
    <circle cx="120" cy="40" r="0.8" opacity="0.5" />
    <circle cx="400" cy="60" r="1.5" opacity="0.9" />
    <circle cx="450" cy="140" r="0.9" opacity="0.6" />
    <circle cx="80" cy="180" r="1.1" opacity="0.8" />
    <circle cx="430" cy="250" r="0.7" opacity="0.5" />
    <circle cx="60" cy="320" r="1.3" opacity="0.9" />
    <circle cx="440" cy="380" r="1.0" opacity="0.7" />
    <circle cx="100" cy="430" r="0.8" opacity="0.5" />
    <circle cx="380" cy="450" r="1.2" opacity="0.8" />
    <circle cx="200" cy="30" r="0.9" opacity="0.6" />
    <circle cx="320" cy="110" r="1.0" opacity="0.7" />
    <circle cx="30" cy="250" r="0.8" opacity="0.5" />
    <circle cx="470" cy="30" r="1.0" opacity="0.8" />
    <circle cx="250" cy="470" r="0.9" opacity="0.6" />
  </g>

  <!-- HUD rings -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.2" class="hud-ring" />
  <circle cx="250" cy="250" r="210" fill="none" stroke="#FF4500" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="15 30" class="hud-ring-fast" />
  <circle cx="250" cy="250" r="185" fill="none" stroke="#00FFFF" stroke-width="0.5" stroke-opacity="0.15" />

  <!-- Tail -->
  <g class="tail">
    <path d="M 360 360 L 420 300 L 440 320 L 430 350 L 445 370 L 430 400 L 425 430" 
          fill="#FF4500" stroke="#3E2723" stroke-width="3" stroke-linejoin="round" />
    <path d="M 405 320 Q 410 335 405 350 M 425 345 Q 430 360 425 375 M 418 385 Q 423 400 418 415" 
          fill="none" stroke="#8B0000" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Main character group -->
  <g class="head-group" filter="url(#softGlow)">
    <!-- Ears (behind head) -->
    <path class="ear-left" d="M 130 210 Q 90 250 100 330 Q 120 360 150 320 Q 165 270 155 220 Z" 
          fill="url(#furOuter)" stroke="#3E2723" stroke-width="3" />
    <path d="M 130 225 Q 110 260 118 320 Q 130 340 145 310" 
          fill="url(#earInner)" opacity="0.9" />
    
    <path class="ear-right" d="M 370 210 Q 410 250 400 330 Q 380 360 350 320 Q 335 270 345 220 Z" 
          fill="url(#furOuter)" stroke="#3E2723" stroke-width="3" />
    <path d="M 370 225 Q 390 260 382 320 Q 370 340 355 310" 
          fill="url(#earInner)" opacity="0.9" />

    <!-- Helmet (top part) -->
    <path d="M 150 220 Q 250 100 350 220 L 350 240 Q 250 260 150 240 Z" 
          fill="url(#helmetGradient)" stroke="#3E2723" stroke-width="3" />
    <path d="M 150 220 Q 250 140 350 220" fill="none" stroke="#FF6347" stroke-width="2" opacity="0.6" />
    <!-- Helmet seam -->
    <path d="M 155 225 Q 250 245 345 225" fill="none" stroke="#3E2723" stroke-width="2" />
    <!-- Helmet fin -->
    <path d="M 340 180 L 360 160 L 350 200 Z" fill="#FF4500" stroke="#3E2723" stroke-width="2" />

    <!-- Antenna -->
    <g class="antenna">
      <line x1="250" y1="150" x2="265" y2="115" stroke="#3E2723" stroke-width="3" stroke-linecap="round" />
      <circle class="antenna-ball" cx="265" cy="110" r="10" fill="#00FFFF" filter="url(#cyanGlow)" />
    </g>

    <!-- Face base (cream white, lower part) -->
    <path d="M 155 230 Q 250 250 345 230 Q 360 290 345 340 Q 250 380 155 340 Q 140 290 155 230 Z" 
          fill="#FDF5E6" stroke="#3E2723" stroke-width="3" />
    <!-- Subtle red ambient shading on lower face -->
    <path d="M 170 340 Q 250 370 330 340 Q 315 360 250 375 Q 185 360 170 340" 
          fill="#FF4500" opacity="0.12" />

    <!-- Closed biological eyes (simple curved lines) -->
    <g stroke="#3E2723" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M 175 275 Q 195 285 215 275" />
      <path d="M 285 275 Q 305 285 325 275" />
    </g>

    <!-- Snout / muzzle -->
    <ellipse cx="250" cy="310" rx="75" ry="50" fill="#FDF5E6" stroke="#3E2723" stroke-width="2" />
    <!-- Nose -->
    <path d="M 230 300 Q 250 290 270 300 Q 250 325 230 300" fill="#3E2723" />
    <!-- Mouth -->
    <path d="M 215 335 Q 250 345 285 335" fill="none" stroke="#3E2723" stroke-width="3" stroke-linecap="round" />
    <!-- Chin beard -->
    <path d="M 235 355 L 245 375 L 250 360 L 255 375 L 265 355" fill="#FDF5E6" stroke="#3E2723" stroke-width="2" stroke-linejoin="round" />

    <!-- Chest fur pattern -->
    <path d="M 220 370 L 230 390 L 240 375 L 250 395 L 260 375 L 270 390 L 280 370" 
          fill="#FDF5E6" stroke="#3E2723" stroke-width="2" stroke-linejoin="round" />

    <!-- Cybernetic eyes on helmet -->
    <g class="helmet-eyes" filter="url(#cyanGlow)">
      <circle cx="205" cy="195" r="22" fill="#1a1a1a" stroke="#00FFFF" stroke-width="2" />
      <circle cx="205" cy="195" r="16" fill="url(#eyeGlow)" />
      <circle cx="295" cy="195" r="22" fill="#1a1a1a" stroke="#00FFFF" stroke-width="2" />
      <circle cx="295" cy="195" r="16" fill="url(#eyeGlow)" />
    </g>
  </g>

  <!-- Label -->
  <text x="250" y="475" text-anchor="middle" fill="#00FFFF" font-family="monospace" font-size="16" letter-spacing="3" filter="url(#cyanGlow)">AKAMARU // ONLINE</text>
</svg>
