<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceBgSleeping" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#4A148C" />
      <stop offset="60%" stop-color="#1A237E" />
      <stop offset="100%" stop-color="#05050F" />
    </radialGradient>
    <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FF5252" /><stop offset="100%" stop-color="#B71C1C" /></linearGradient>
    <linearGradient id="orangeFur" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FF6347" /><stop offset="100%" stop-color="#CC3300" /></linearGradient>
  </defs>
  <style>
    /* Langsame, tiefe Stasis-Atmung */
    .stasis-head { transform-origin: 250px 250px; animation: stasis 10s infinite ease-in-out; }
    /* Kristallines Funkeln im Hintergrund */
    .crystal-star { animation: iceTwinkle 5s infinite alternate; }
    @keyframes stasis { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.98); } }
    @keyframes iceTwinkle { 0% { opacity: 0.1; } 100% { opacity: 0.5; transform: scale(1.1); } }
  </style>
  
  <rect width="500" height="500" fill="url(#spaceBgSleeping)" />
  <g fill="#E0F7FA" opacity="0.4">
    <circle cx="80" cy="120" r="1" class="crystal-star"/><circle cx="200" cy="60" r="1.5" class="crystal-star"/><circle cx="450" cy="220" r="1"/><circle cx="100" cy="380" r="1.2" class="crystal-star"/>
  </g>
  
  <g transform="translate(-50, -20) scale(1.2)">
    <g class="stasis-head">
      <g><path d="M 170 200 C 100 200, 110 400, 140 420 C 170 440, 180 300, 170 200 Z" fill="url(#orangeFur)" stroke="#3E2723" stroke-width="3"/><path d="M 160 220 C 120 220, 130 380, 145 400 C 160 420, 170 300, 160 220 Z" fill="#FDF5E6" /></g>
      <g><path d="M 330 200 C 400 200, 390 400, 360 420 C 330 440, 320 300, 330 200 Z" fill="url(#orangeFur)" stroke="#3E2723" stroke-width="3"/><path d="M 340 220 C 380 220, 370 380, 355 400 C 340 420, 330 300, 340 220 Z" fill="#FDF5E6" /></g>
      <path d="M 160 200 C 145 320, 160 380, 250 380 C 340 380, 355 320, 340 200 Z" fill="#FDF5E6" stroke="#3E2723" stroke-width="3"/>
      <path d="M 225 375 L 235 400 L 250 385 L 265 400 L 275 375 Z" fill="#FDF5E6" stroke="#3E2723" stroke-width="3" stroke-linejoin="round"/>
      <path d="M 155 200 C 155 80, 345 80, 345 200 Z" fill="url(#helmetGrad)" stroke="#3E2723" stroke-width="3"/>
      <line x1="155" y1="200" x2="345" y2="200" stroke="#3E2723" stroke-width="5" stroke-linecap="round"/>
      <g transform="translate(250, 100) rotate(-45)"><path d="M 0 0 Q 15 -25 20 -50" fill="none" stroke="#FF5252" stroke-width="5"/><circle cx="20" cy="-50" r="10" fill="#FF5252" stroke="#3E2723"/></g>
      <path d="M 180 250 Q 205 260 220 250" fill="none" stroke="#212121" stroke-width="3"/><path d="M 280 250 Q 295 260 320 250" fill="none" stroke="#212121" stroke-width="3"/>
      <path d="M 235 285 L 265 285 L 250 305 Z" fill="#3E2723" stroke="#3E2723" stroke-width="3"/>
      <path d="M 190 345 Q 250 325 310 345" fill="none" stroke="#3E2723" stroke-width="12"/>
      <path d="M 195 345 Q 250 330 305 345" fill="none" stroke="#1A0000" stroke-width="3"/>
      <g transform="translate(205, 155)"><circle cx="0" cy="0" r="18" fill="#424242"/><circle cx="0" cy="0" r="18" fill="none" stroke="#2D0014" stroke-width="4"/></g>
      <g transform="translate(295, 155)"><circle cx="0" cy="0" r="18" fill="#424242"/><circle cx="0" cy="0" r="18" fill="none" stroke="#2D0014" stroke-width="4"/></g>
      <rect x="235" y="115" width="30" height="15" rx="3" fill="#424242" stroke="#FDF5E6" stroke-width="1.5"/><rect x="238" y="118" width="8" height="9" fill="#B71C1C"/>
    </g>
  </g>
</svg>