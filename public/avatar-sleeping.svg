<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="75%"><stop offset="0%" stop-color="#C2185B" /><stop offset="45%" stop-color="#880E4F" /><stop offset="80%" stop-color="#2D0014" /><stop offset="100%" stop-color="#0F0005" /></radialGradient>
    <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FF5252" /><stop offset="100%" stop-color="#B71C1C" /></linearGradient>
    <linearGradient id="orangeFur" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FF6347" /><stop offset="100%" stop-color="#CC3300" /></linearGradient>
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
  </defs>
  <style>
    .float-slow { transform-origin: 250px 250px; animation: float 8s infinite ease-in-out; }
    .star1 { animation: twinkle 4s infinite alternate; }
    .star2 { animation: twinkle 6s infinite alternate-reverse; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes twinkle { 0% { opacity: 0.1; transform: scale(0.8); } 100% { opacity: 0.6; transform: scale(1.1); } }
  </style>
  <rect width="500" height="500" fill="url(#spaceBg)" />
  <g fill="#FFF" opacity="0.6">
    <circle cx="80" cy="120" r="1.5" class="star1" /><circle cx="40" cy="250" r="2" class="star2" fill="#FFC0CB"/><circle cx="100" cy="380" r="1" class="star1" /><circle cx="450" cy="220" r="2" class="star2" /><circle cx="420" cy="400" r="2.5" class="star1" fill="#FFC0CB"/>
  </g>
  <g transform="translate(-50, -20) scale(1.2)">
    <g class="float-slow">
      <path d="M 170 200 C 100 200, 110 400, 140 420 C 170 440, 180 300, 170 200 Z" fill="url(#orangeFur)" stroke="#4A0000" stroke-width="3"/>
